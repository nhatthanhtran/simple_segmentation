name: segmentation_env
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10

  # PyTorch + CUDA
  - pytorch=2.2
  - torchvision
  - pytorch-cuda=11.8

  # Core libs
  - numpy
  - scipy
  - pillow
  - matplotlib
  - opencv

  # Pip section
  - pip
  - pip:
      # YOLOv8
      - ultralytics

      # HuggingFace
      - transformers
      - accelerate
      - timm

      # Utils
      - tqdm
      - einops

      # Optional (nice to have)
      - onnx
      - onnxruntime